<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#4F7FFF"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="קניות משפחה"/>
<title>🛒 קניות משפחה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--blue:#4F7FFF;--blue-l:#EEF3FF;--green:#22C55E;--green-l:#F0FDF4;--green-d:#15803D;--red:#EF4444;--red-l:#FEF2F2;--g0:#fff;--g1:#F8F9FA;--g2:#F1F3F5;--g3:#E9ECEF;--g4:#DEE2E6;--g6:#ADB5BD;--g7:#6C757D;--g8:#495057;--g9:#212529;--r:12px}
html,body{height:100%;overflow:hidden;background:var(--g1)}
body{font-family:'Heebo',sans-serif;color:var(--g9)}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;background:var(--g0)}
.header{background:var(--g0);border-bottom:1px solid var(--g3);padding:12px 16px 0;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.app-title{font-size:20px;font-weight:700}
.hbtns{display:flex;gap:8px}
.ibtn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--g4);background:var(--g0);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ibtn:active{background:var(--g2);transform:scale(0.95)}
.tabs{display:flex}
.tab{flex:1;padding:10px 0 11px;font-size:13px;font-weight:500;color:var(--g6);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Heebo',sans-serif}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.sinput{flex:1;height:42px;border:1.5px solid var(--g4);border-radius:10px;padding:0 14px;font-size:15px;background:var(--g1);font-family:'Heebo',sans-serif;color:var(--g9);outline:none}
.sinput:focus{border-color:var(--blue);background:var(--g0)}
.micbtn{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--g4);background:var(--g1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.micbtn.on{border-color:var(--red);background:var(--red-l);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.miclabel{text-align:center;font-size:12px;color:var(--red);height:16px;margin-bottom:6px}
.chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:100px;font-size:12px;border:1.5px solid var(--g4);background:var(--g0);color:var(--g7);cursor:pointer;white-space:nowrap;font-family:'Heebo',sans-serif}
.chip.active{background:var(--blue-l);border-color:var(--blue);color:var(--blue)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.pcard{background:var(--g1);border:1.5px solid var(--g3);border-radius:var(--r);padding:10px 12px;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:8px}
.pcard:active{transform:scale(0.97)}
.pcard.inlist{background:var(--green-l);border-color:var(--green)}
.pemoji{font-size:22px;flex-shrink:0;margin-top:2px}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:600;color:var(--g9)}
.pdetail{font-size:11px;color:var(--g7);margin-top:2px;line-height:1.4}
.pcat{font-size:10px;color:var(--g6);margin-top:1px}
.paddicon{margin-right:auto;font-size:16px;flex-shrink:0}
.slabel{font-size:13px;font-weight:500;color:var(--g6);margin:4px 0 10px}
.ilist{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.litem{background:var(--g0);border:1.5px solid var(--g3);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;transition:all 0.2s}
.litem.chk{opacity:0.4}
.cbtn{width:26px;height:26px;border-radius:50%;border:2px solid var(--g4);background:var(--g0);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
.cbtn.done{background:var(--green);border-color:var(--green);color:white}
.iemoji{font-size:20px;flex-shrink:0}
.ibody{flex:1;min-width:0}
.iname{font-size:14px;font-weight:600;color:var(--g9)}
.idetail{font-size:11px;color:var(--g7);margin-top:1px}
.qrow{display:flex;align-items:center;gap:8px;margin-top:4px}
.qbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--g4);background:var(--g1);color:var(--g8);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qbtn:active{background:var(--g3);transform:scale(0.9)}
.qnum{font-size:13px;font-weight:500;min-width:20px;text-align:center}
.delbtn{background:none;border:none;color:var(--g4);font-size:18px;cursor:pointer;padding:4px}
.delbtn:active{color:var(--red)}
.empty{text-align:center;padding:60px 20px;color:var(--g6)}
.empty-icon{font-size:48px;margin-bottom:12px}
.add-bar{display:flex;gap:8px;padding:12px 16px;background:var(--g0);border-top:1px solid var(--g3);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.ainput{flex:1;height:44px;border:1.5px solid var(--g4);border-radius:10px;padding:0 14px;font-size:15px;font-family:'Heebo',sans-serif;background:var(--g1);color:var(--g9);outline:none}
.ainput:focus{border-color:var(--blue);background:var(--g0)}
.amicbtn{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--g4);background:var(--g1);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.amicbtn.on{border-color:var(--red);background:var(--red-l);animation:pulse 1s infinite}
.abtn{height:44px;padding:0 18px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;white-space:nowrap}
.abtn:active{transform:scale(0.97)}
/* VARIANT MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end}
.sheet{background:var(--g0);border-radius:20px 20px 0 0;padding:20px 16px max(20px,env(safe-area-inset-bottom));width:100%;max-height:80vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--g4);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:4px}
.sheet-sub{font-size:13px;color:var(--g6);margin-bottom:16px}
.vlist{display:flex;flex-direction:column;gap:8px}
.vitem{background:var(--g1);border:1.5px solid var(--g3);border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.vitem:active{background:var(--blue-l);border-color:var(--blue)}
.vemoji{font-size:22px}
.vinfo{flex:1}
.vname{font-size:14px;font-weight:600}
.vdetail{font-size:12px;color:var(--g7);margin-top:2px}
.vprice{font-size:12px;color:var(--g7);text-align:left;white-space:nowrap}
.closebtn{width:100%;margin-top:12px;padding:14px;border:1.5px solid var(--g4);border-radius:10px;background:var(--g0);font-size:15px;color:var(--g7);cursor:pointer;font-family:'Heebo',sans-serif}
/* PRICES */
.saving-card{background:var(--green-l);border:1.5px solid #86EFAC;border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.sicon{font-size:32px}
.slbl{font-size:13px;color:var(--green-d)}
.samt{font-size:24px;font-weight:700;color:var(--green-d)}
.sdesc{font-size:12px;color:var(--green-d)}
.storelist{display:flex;flex-direction:column;gap:8px}
.stcard{background:var(--g0);border:1.5px solid var(--g3);border-radius:var(--r);overflow:hidden}
.stcard.best{border-color:var(--blue)}
.sthead{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.stdot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stinfo{flex:1}
.stname{font-size:15px;font-weight:600}
.stsub{font-size:12px;color:var(--g6);margin-top:2px}
.stprice{text-align:left}
.sttotal{font-size:20px;font-weight:700}
.besttag{display:inline-block;background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:600;padding:2px 8px;border-radius:100px;margin-top:2px}
.strows{border-top:1px solid var(--g3)}
.strow{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid var(--g3);font-size:13px}
.strow:last-child{border-bottom:none}
.rowitem{color:var(--g7)}
.rowprice{font-weight:600}
.rowna{color:var(--g6);font-size:12px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(33,37,41,0.92);color:white;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;white-space:nowrap;z-index:999;opacity:0;transition:opacity 0.25s;pointer-events:none}
.toast.show{opacity:1}
.nonelist{text-align:center;padding:60px 20px;color:var(--g6)}
/* share */
.sopts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sopt{background:var(--g1);border:1.5px solid var(--g3);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer}
.sopt:active{background:var(--g2);transform:scale(0.97)}
.sopticon{font-size:26px;margin-bottom:6px}
.soptlbl{font-size:13px;color:var(--g7);font-weight:500}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">🛒 קניות משפחה</div>
      <div class="hbtns">
        <button class="ibtn" onclick="openShare()">📤</button>
        <button class="ibtn" onclick="clearDone()">✅</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('list',this)">הרשימה</button>
      <button class="tab" onclick="switchTab('catalog',this)">קטלוג</button>
      <button class="tab" onclick="switchTab('prices',this)">מחירים</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="add-bar" id="addBar">
    <input class="ainput" id="addInput" placeholder="הוסף מוצר..." dir="rtl" autocomplete="off"/>
    <button class="amicbtn" id="addMic" onclick="startMic('add')">🎙️</button>
    <button class="abtn" onclick="doAdd()">הוסף</button>
  </div>
</div>

<!-- Variant picker -->
<div class="overlay" id="varOverlay" style="display:none" onclick="closeVar(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="varTitle"></div>
    <div class="sheet-sub">בחר סוג / גודל</div>
    <div class="vlist" id="varList"></div>
    <button class="closebtn" onclick="closeVarBtn()">ביטול</button>
  </div>
</div>

<!-- Share sheet -->
<div class="overlay" id="shareOverlay" style="display:none" onclick="closeShareEv(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div class="sheet-title">שיתוף הרשימה</div>
    <div class="sheet-sub">שתף עם בני המשפחה</div>
    <div class="sopts">
      <div class="sopt" onclick="doShare('whatsapp')"><div class="sopticon">💬</div><div class="soptlbl">WhatsApp</div></div>
      <div class="sopt" onclick="doShare('copy')"><div class="sopticon">📋</div><div class="soptlbl">העתק רשימה</div></div>
      <div class="sopt" onclick="doShare('native')"><div class="sopticon">📤</div><div class="soptlbl">שתף</div></div>
      <div class="sopt" onclick="doShare('sms')"><div class="sopticon">💌</div><div class="soptlbl">SMS</div></div>
    </div>
    <button class="closebtn" onclick="closeShare()">סגור</button>
  </div>
</div>

<div class="toast" id="toast"></div>

// STATE
let list = JSON.parse(localStorage.getItem('shopList')||'[]');
let tab = 'list';
let selCat = 'הכל';
let catQ = '';
let expStore = null;
let isListening = false;
let micTarget = 'add';
let recognition = null;

function save(){localStorage.setItem('shopList',JSON.stringify(list))}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  tab=t; selCat='הכל'; catQ=''; expStore=null;
  document.getElementById('addBar').style.display=t==='list'?'flex':'none';
  render();
}

function render(){
  const c=document.getElementById('content');
  if(tab==='list') renderList(c);
  else if(tab==='catalog') renderCatalog(c);
  else renderPrices(c);
}

function renderList(c){
  const active=list.filter(i=>!i.checked);
  const done=list.filter(i=>i.checked);
  if(!list.length){c.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><h3 style="font-size:16px;color:#6C757D;margin-bottom:6px">הרשימה ריקה</h3><p style="font-size:13px;color:#ADB5BD">הוסף מוצרים בתיבה למטה<br>או בחר מהקטלוג</p></div>`;return;}
  let h='';
  if(active.length){h+=`<div class="slabel">לקנות · ${active.length}</div><div class="ilist">`;active.forEach(i=>h+=itemH(i));h+='</div>';}
  if(done.length){h+=`<div class="slabel" style="margin-top:16px">נרכש · ${done.length}</div><div class="ilist">`;done.forEach(i=>h+=itemH(i));h+='</div>';}
  c.innerHTML=h;
}

function itemH(item){
  return `<div class="litem${item.checked?' chk':''}">
    <button class="cbtn${item.checked?' done':''}" onclick="toggle('${item.uid}')">${item.checked?'✓':''}</button>
    <span class="iemoji">${item.emoji}</span>
    <div class="ibody">
      <div class="iname">${item.name}</div>
      ${item.detail?`<div class="idetail">${item.detail}</div>`:''}
      <div class="qrow">
        <button class="qbtn" onclick="chQty('${item.uid}',-1)">−</button>
        <span class="qnum">${item.qty}</span>
        <button class="qbtn" onclick="chQty('${item.uid}',1)">+</button>
      </div>
    </div>
    <button class="delbtn" onclick="del('${item.uid}')">✕</button>
  </div>`;
}

function renderCatalog(c){
  let h=`<div class="search-row">
    <input class="sinput" id="catIn" value="${catQ.replace(/"/g,'&quot;')}" placeholder="חפש מוצר..." dir="rtl" autocomplete="off" oninput="catQ=this.value;render()"/>
    <button class="micbtn${isListening&&micTarget==='catalog'?' on':''}" onclick="startMic('catalog')">🎙️</button>
  </div>
  <div class="miclabel" id="catMicLbl">${isListening&&micTarget==='catalog'?'🎙 מאזין...':''}</div>
  <div class="chips">`;
  CATS.forEach(cat=>h+=`<div class="chip${cat===selCat?' active':''}" onclick="selCat2('${cat}')">${cat}</div>`);
  h+=`</div><div class="cat-grid">`;
  const q=catQ.toLowerCase();
  const aliasMatch=Object.keys(ALIASES).find(k=>q.includes(k));
  const qResolved=aliasMatch?ALIASES[aliasMatch].toLowerCase():q;
  const filtered=PRODUCTS.filter(p=>(selCat==='הכל'||p.cat===selCat)&&(!q||p.name.toLowerCase().includes(qResolved)||p.name.toLowerCase().includes(q)||p.variants.some(v=>v.v.toLowerCase().includes(q)||v.note.toLowerCase().includes(q)||v.v.toLowerCase().includes(qResolved))));
  filtered.forEach(p=>{
    const inList=list.some(i=>i.pid===p.id);
    const cnt=inList?list.filter(i=>i.pid===p.id).length:0;
    h+=`<div class="pcard${inList?' inlist':''}" onclick="openVar(${p.id})">
      <span class="pemoji">${p.emoji}</span>
      <div class="pinfo">
        <div class="pname">${p.name}</div>
        <div class="pdetail">${p.variants.length} אפשרויות</div>
        <div class="pcat">${p.cat}</div>
      </div>
      <span class="paddicon">${inList?`✅${cnt>1?cnt:''}`:''}</span>
    </div>`;
  });
  if(!filtered.length)h+=`<div style="grid-column:1/-1;text-align:center;color:#adb5bd;padding:30px;font-size:14px">לא נמצאו מוצרים</div>`;
  h+='</div>';
  c.innerHTML=h;
}

function selCat2(c){selCat=c;render();}

function openVar(pid){
  const p=PRODUCTS.find(x=>x.id===pid);
  if(!p)return;
  document.getElementById('varTitle').textContent=p.emoji+' '+p.name;
  const vl=document.getElementById('varList');
  vl.innerHTML=p.variants.map((v,i)=>{
    const inList=list.some(item=>item.pid===pid&&item.varIdx===i);
    return `<div class="vitem${inList?' inlist':''}" onclick="addVar(${pid},${i})">
      <span class="vemoji">${p.emoji}</span>
      <div class="vinfo">
        <div class="vname">${v.v}</div>
        <div class="vdetail">${v.note||v.w}</div>
      </div>
      <div class="vprice">${inList?'✅ ברשימה':''}</div>
    </div>`;
  }).join('');
  document.getElementById('varOverlay').style.display='flex';
}

function addVar(pid,varIdx){
  const p=PRODUCTS.find(x=>x.id===pid);
  const v=p.variants[varIdx];
  const exists=list.find(i=>i.pid===pid&&i.varIdx===varIdx);
  if(exists){exists.qty++;save();toast(`${v.v} ×${exists.qty}`);}
  else{list.push({uid:Date.now()+'',pid,varIdx,name:v.v,detail:v.w+(v.note?' · '+v.note:''),emoji:p.emoji,qty:1,checked:false});save();toast(`${p.name} נוסף`);}
  closeVarBtn();render();
}

function closeVar(e){if(e.target===document.getElementById('varOverlay'))closeVarBtn();}
function closeVarBtn(){document.getElementById('varOverlay').style.display='none';}

function renderPrices(c){
  const active=list.filter(i=>!i.checked);
  if(!active.length){c.innerHTML=`<div class="nonelist"><div style="font-size:48px;margin-bottom:12px">💰</div><div style="font-size:16px;font-weight:600;color:#495057;margin-bottom:6px">אין מוצרים להשוואה</div><div style="font-size:13px;color:#adb5bd">הוסף מוצרים לרשימה תחילה</div></div>`;return;}
  const totals=STORES.map(s=>{
    let total=0,n=0;
    active.forEach(item=>{
      const p=PRODUCTS.find(x=>x.id===item.pid);
      if(p&&item.varIdx!==undefined&&p.variants[item.varIdx]&&p.variants[item.varIdx].prices[s.id]){
        total+=p.variants[item.varIdx].prices[s.id]*item.qty;n++;
      } else if(p&&p.variants[0]&&p.variants[0].prices[s.id]){
        total+=p.variants[0].prices[s.id]*item.qty;n++;
      }
    });
    return{...s,total:Math.round(total*10)/10,n,max:active.length};
  }).sort((a,b)=>a.total-b.total);
  const saving=Math.round((totals[totals.length-1].total-totals[0].total)*10)/10;
  let h='';
  if(saving>0){h+=`<div class="saving-card"><div class="sicon">🐷</div><div><div class="slbl">חיסכון אפשרי</div><div class="samt">₪${saving}</div><div class="sdesc">${totals[0].name} מול ${totals[totals.length-1].name}</div></div></div>`;}
  h+='<div class="storelist">';
  totals.forEach((s,idx)=>{
    const open=expStore===s.id;
    h+=`<div class="stcard${idx===0?' best':''}">
      <div class="sthead" onclick="expSt('${s.id}')">
        <div class="stdot" style="background:${s.bg}">${idx+1}.</div>
        <div class="stinfo"><div class="stname">${s.name}</div><div class="stsub">${s.n}/${s.max} מוצרים</div></div>
        <div class="stprice"><div class="sttotal">₪${s.total}</div>${idx===0?'<span class="besttag">הכי זול ✓</span>':''}</div>
      </div>`;
    if(open){
      h+='<div class="strows">';
      active.forEach(item=>{
        const p=PRODUCTS.find(x=>x.id===item.pid);
        let price=null;
        if(p){
          const vi=item.varIdx!==undefined?item.varIdx:0;
          if(p.variants[vi]&&p.variants[vi].prices[s.id])price=p.variants[vi].prices[s.id];
        }
        h+=`<div class="strow"><span class="rowitem">${item.emoji} ${item.name} ×${item.qty}</span>${price?`<span class="rowprice">₪${price}</span>`:'<span class="rowna">לא זמין</span>'}</div>`;
      });
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  c.innerHTML=h;
}

function expSt(id){expStore=expStore===id?null:id;render();}

// ACTIONS
function toggle(uid){const i=list.find(x=>x.uid==uid);if(i){i.checked=!i.checked;save();render();}}
function chQty(uid,d){const i=list.find(x=>x.uid==uid);if(i){i.qty=Math.max(1,i.qty+d);save();render();}}
function del(uid){list=list.filter(x=>x.uid!=uid);save();render();}
function clearDone(){list=list.filter(i=>!i.checked);save();render();toast('מסומנים נמחקו');}

function doAdd(){
  const inp=document.getElementById('addInput');
  const val=inp.value.trim();
  if(!val)return;
  addFreeText(val);
  inp.value='';inp.focus();
}

function addFreeText(name){
  const q=name.toLowerCase();
  const aliasMatch=Object.keys(ALIASES).find(k=>q.includes(k));
  const qResolved=aliasMatch?ALIASES[aliasMatch].toLowerCase():q;
  const found=PRODUCTS.find(p=>p.name.toLowerCase().includes(qResolved)||p.name.toLowerCase().includes(q)||p.variants.some(v=>v.v.toLowerCase().includes(q)));
  if(found&&found.variants.length>1){openVar(found.id);return;}
  if(found){addVar(found.id,0);return;}
  list.push({uid:Date.now()+'',pid:null,varIdx:undefined,name,detail:'',emoji:'🛒',qty:1,checked:false});
  save();render();toast(`${name} נוסף`);
}

document.getElementById('addInput').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});

// VOICE
function startMic(target){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('נסה Chrome');return;}
  if(isListening){recognition&&recognition.stop();return;}
  micTarget=target;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='he-IL';recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;document.getElementById('addMic').classList.add('on');render();};
  recognition.onresult=e=>{
    const text=e.results[0][0].transcript.trim();
    if(target==='add')addFreeText(text);
    else{catQ=text;render();}
    toast(`שמעתי: "${text}"`);
  };
  recognition.onerror=()=>toast('לא הצלחתי לשמוע');
  recognition.onend=()=>{isListening=false;document.getElementById('addMic').classList.remove('on');render();};
  recognition.start();
}

// SHARE
function openShare(){document.getElementById('shareOverlay').style.display='flex';}
function closeShareEv(e){if(e.target===document.getElementById('shareOverlay'))closeShare();}
function closeShare(){document.getElementById('shareOverlay').style.display='none';}
function doShare(type){
  const text='🛒 רשימת הקניות שלנו:\n'+list.filter(i=>!i.checked).map(i=>`${i.emoji} ${i.name}${i.detail?' ('+i.detail+')':''} ×${i.qty}`).join('\n');
  if(type==='whatsapp')window.open('https://wa.me/?text='+encodeURIComponent(text));
  else if(type==='sms')window.open('sms:?body='+encodeURIComponent(text));
  else if(type==='native'&&navigator.share)navigator.share({title:'רשימת קניות',text});
  else{navigator.clipboard&&navigator.clipboard.writeText(text);toast('הרשימה הועתקה!');}
  closeShare();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// INIT
document.getElementById('addBar').style.display='flex';
render();
